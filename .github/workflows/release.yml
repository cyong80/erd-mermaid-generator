name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - platform: mac
            os: macos-latest
            script: package:mac
          - platform: win
            os: windows-latest
            script: package:win
          - platform: linux
            os: ubuntu-latest
            script: package:linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          yarn version --no-git-tag-version --new-version $VERSION

      - name: Build and publish (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: yarn ${{ matrix.script }} ${{ startsWith(github.ref, 'refs/tags/') && '--publish always' || '--publish never' }}

      - name: Upload artifacts (수동 실행 시)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: erd-generator-${{ matrix.platform }}
          path: dist/
